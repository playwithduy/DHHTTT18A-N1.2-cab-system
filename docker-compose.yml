version: '3.9'

# ─── CabGo Microservices — Docker Compose (Dev) ───────────────
# Run: docker-compose up -d

services:

  # ── Infrastructure ──────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: cabgo
      POSTGRES_PASSWORD: cabgo_secret
      POSTGRES_DB: cabgo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cabgo"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@cabgo.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass cabgo_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "cabgo_redis", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  # ── API Gateway ──────────────────────────────────────────────

  api-gateway:
    build: ./services/api-gateway
    ports:
      - "8080:8080"
    volumes:
      - ./services/api-gateway/src:/app/src
    environment:
      AUTH_SERVICE_URL: http://auth-service:3001
      BOOKING_SERVICE_URL: http://booking-service:3002
      RIDE_SERVICE_URL: http://ride-service:3003
      DRIVER_SERVICE_URL: http://driver-service:3004
      PAYMENT_SERVICE_URL: http://payment-service:3005
      PRICING_SERVICE_URL: http://pricing-service:3006
      NOTIFICATION_SERVICE_URL: http://notification-service:3007
      AI_MATCHING_SERVICE_URL: http://ai-matching-service:3008
      FRAUD_SERVICE_URL: http://fraud-service:3009
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: redis://:cabgo_redis@redis:6379
    depends_on: [redis]

  # ── Microservices ────────────────────────────────────────────

  auth-service:
    build: ./services/auth-service
    ports:
      - "3001:3001"
    volumes:
      - ./services/auth-service/src:/app/src
      - ./services/auth-service/prisma:/app/prisma
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://cabgo:cabgo_secret@postgres:5432/cabgo_auth
      REDIS_URL: redis://:cabgo_redis@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 15m
      REFRESH_TOKEN_EXPIRES_IN: 7d
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }

  booking-service:
    build: ./services/booking-service
    ports:
      - "3002:3002"
    volumes:
      - ./services/booking-service/src:/app/src
      - ./services/booking-service/prisma:/app/prisma
    environment:
      PORT: 3002
      DATABASE_URL: postgresql://cabgo:cabgo_secret@postgres:5432/cabgo_booking
      KAFKA_BROKERS: kafka:9092
      REDIS_URL: redis://:cabgo_redis@redis:6379
      DRIVER_SERVICE_URL: http://driver-service:3004
      AI_MATCHING_URL: http://ai-matching-service:3008
      PRICING_SERVICE_URL: http://pricing-service:3006
      NOTIFY_SERVICE_URL: http://notification-service:3007
      PAYMENT_SERVICE_URL: http://payment-service:3005
    depends_on:
      postgres: { condition: service_healthy }

  ride-service:
    build: ./services/ride-service
    ports:
      - "3003:3003"
    volumes:
      - ./services/ride-service/src:/app/src
    environment:
      PORT: 3003
      REDIS_URL: redis://:cabgo_redis@redis:6379
      KAFKA_BROKERS: kafka:9092
    depends_on:
      redis:     { condition: service_healthy }

  driver-service:
    build: ./services/driver-service
    ports:
      - "3004:3004"
    volumes:
      - ./services/driver-service/src:/app/src
      - ./services/driver-service/prisma:/app/prisma
    environment:
      PORT: 3004
      DATABASE_URL: postgresql://cabgo:cabgo_secret@postgres:5432/cabgo_driver
      REDIS_URL: redis://:cabgo_redis@redis:6379
      KAFKA_BROKERS: kafka:9092
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }

  payment-service:
    build: ./services/payment-service
    ports:
      - "3005:3005"
    volumes:
      - ./services/payment-service/src:/app/src
      - ./services/payment-service/prisma:/app/prisma
    environment:
      PORT: 3005
      DATABASE_URL: postgresql://cabgo:cabgo_secret@postgres:5432/cabgo_payment
      KAFKA_BROKERS: kafka:9092
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
    depends_on:
      postgres: { condition: service_healthy }

  pricing-service:
    build: ./services/pricing-service
    ports:
      - "3006:3006"
    environment:
      PORT: 3006
      REDIS_URL: redis://:cabgo_redis@redis:6379
    volumes:
      - ./services/pricing-service/src:/app/src
    depends_on:
      redis: { condition: service_healthy }

  notification-service:
    build: ./services/notification-service
    ports:
      - "3007:3007"
    environment:
      PORT: 3007
      KAFKA_BROKERS: kafka:9092
    volumes:
      - ./services/notification-service/src:/app/src
    depends_on:
      kafka: { condition: service_started }

  ai-matching-service:
    build: ./services/ai-matching-service
    ports:
      - "3008:3008"
    environment:
      PORT: 3008
      REDIS_URL: redis://:cabgo_redis@redis:6379
      KAFKA_BROKERS: kafka:9092
    volumes:
      - ./services/ai-matching-service/src:/app/src
    depends_on:
      redis: { condition: service_healthy }

  fraud-service:
    build: ./services/fraud-service
    ports:
      - "3009:3009"
    volumes:
      - ./services/fraud-service/src:/app/src
    environment:
      PORT: 3009
    depends_on:
      redis: { condition: service_healthy }

  # ── Frontend Apps ─────────────────────────────────────────────

  customer-app:
    build:
      context: .
      dockerfile: ./apps/customer-app/Dockerfile
      args:
        NEXT_PUBLIC_API_GATEWAY_URL: http://localhost:8080
        NEXT_PUBLIC_WS_URL: http://localhost:8080
        NEXT_PUBLIC_MAPBOX_TOKEN: ${MAPBOX_TOKEN}
    ports:
      - "3100:3100"
    volumes:
      - ./apps/customer-app:/app/apps/customer-app
      - ./packages/types:/app/packages/types
      - /app/apps/customer-app/node_modules

  driver-app:
    build:
      context: .
      dockerfile: ./apps/driver-app/Dockerfile
      args:
        NEXT_PUBLIC_API_GATEWAY_URL: http://localhost:8080
        NEXT_PUBLIC_WS_URL: http://localhost:8080
    ports:
      - "3200:3200"
    volumes:
      - ./apps/driver-app:/app/apps/driver-app
      - ./packages/types:/app/packages/types
      - /app/apps/driver-app/node_modules

  admin-dashboard:
    build:
      context: .
      dockerfile: ./apps/admin-dashboard/Dockerfile
      args:
        NEXT_PUBLIC_API_GATEWAY_URL: http://localhost:8080
    ports:
      - "3300:3300"
    volumes:
      - ./apps/admin-dashboard:/app/apps/admin-dashboard
      - /app/apps/admin-dashboard/node_modules

volumes:
  postgres_data:
  pgadmin_data:
  redis_data:

networks:
  default:
    name: cabgo-network
