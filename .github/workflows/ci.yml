name: "CabGo: Distributed Microservices Architecture"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: BUILD & TEST (CI)
  # ─────────────────────────────────────────────────────────────
  build-and-test:
    name: "CI — Build & Integration Tests"
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      JWT_SECRET: cabgo_secret_32_characters_long_system_test
      STRIPE_SECRET_KEY: sk_test_dummy
      MAPBOX_TOKEN: pk.dummy

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Newman & Newman HTML Extra
      run: |
        npm install -g newman newman-reporter-htmlextra

    - name: Spin up Infrastructure & Microservices
      run: |
        # 1. Start Infrastructure First
        docker compose up -d postgres redis zookeeper kafka
        echo "Waiting 15s for databases to boot..."
        sleep 15
        
        # 2. Start Core Backend Services (EXCLUDE heavy frontends to prevent Runner OOM)
        docker compose up -d --build api-gateway auth-service booking-service ride-service driver-service payment-service pricing-service notification-service ai-matching-service fraud-service
        
        echo "Pushing Database Schemas..."
        docker compose exec -T auth-service npx prisma db push --accept-data-loss
        docker compose exec -T booking-service npx prisma db push --accept-data-loss
        docker compose exec -T driver-service npx prisma db push --accept-data-loss
        docker compose exec -T payment-service npx prisma db push --accept-data-loss
        
    - name: Wait for Services to Warm Up
      run: |
        echo "Waiting for Postgres, Kafka and Node services to initialize..."
        
        # Robust Wait Loop (up to 2-3 minutes) - checking all core ports
        for i in {1..30}; do
          if curl -s http://localhost:8080/health > /dev/null && \
             curl -s http://localhost:3002/health > /dev/null && \
             curl -s http://localhost:3005/health > /dev/null; then
            echo "✅ API Gateway, Booking, and Payment Services are ALL UP!"
            break
          fi
          echo "Waiting for services... $i/30"
          sleep 5
        done
        
        # Verify Core Services one last time or print logs and fail
        curl -s -f http://localhost:8080/health > /dev/null || (echo "Gateway failed. Logs:" && docker compose logs api-gateway && exit 1)
        curl -s -f http://localhost:3002/health > /dev/null || (echo "Booking failed. Logs:" && docker compose logs booking-service && exit 1)
        curl -s -f http://localhost:3005/health > /dev/null || (echo "Payment failed. Logs:" && docker compose logs payment-service && exit 1)
        
    - name: Run JS Integration Test Scripts (White-box Testing)
      run: |
        # Cài đặt thư viện phụ thuộc cho JS Scripts
        npm install axios
        echo "--- Running Level 1-12 System Integration JS Scripts ---"
        node tests/verify_lv10.js || exit 1
        node tests/verify_lv11.js || exit 1
        node tests/verify_lv12.js || exit 1
        echo "✅ JS Tests Passed."

    - name: Ensure Postman Test Script is Executable
      run: chmod +x tests/run-ci-tests.sh

    - name: Run 120+ Postman Tests (Mathematical Proof)
      run: ./tests/run-ci-tests.sh

    - name: Upload Test Coverage Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: newman-html-reports
        path: tests/reports/
        retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # JOB 2: DEPLOY (CD) — runs only on main branch after CI passes
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: "CD — Deploy to Production"
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Extract Git metadata
      id: meta
      run: |
        echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
        echo "timestamp=$(date -u +'%Y%m%d%H%M%S')" >> $GITHUB_OUTPUT

    - name: Build & Push — api-gateway
      uses: docker/build-push-action@v5
      with:
        context: ./services/api-gateway
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/cabgo-api-gateway:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/cabgo-api-gateway:${{ steps.meta.outputs.sha_short }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build & Push — auth-service
      uses: docker/build-push-action@v5
      with:
        context: ./services/auth-service
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/cabgo-auth-service:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/cabgo-auth-service:${{ steps.meta.outputs.sha_short }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build & Push — booking-service
      uses: docker/build-push-action@v5
      with:
        context: ./services/booking-service
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/cabgo-booking-service:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/cabgo-booking-service:${{ steps.meta.outputs.sha_short }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build & Push — driver-service
      uses: docker/build-push-action@v5
      with:
        context: ./services/driver-service
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/cabgo-driver-service:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/cabgo-driver-service:${{ steps.meta.outputs.sha_short }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build & Push — payment-service
      uses: docker/build-push-action@v5
      with:
        context: ./services/payment-service
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/cabgo-payment-service:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/cabgo-payment-service:${{ steps.meta.outputs.sha_short }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build & Push — pricing-service
      uses: docker/build-push-action@v5
      with:
        context: ./services/pricing-service
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/cabgo-pricing-service:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/cabgo-pricing-service:${{ steps.meta.outputs.sha_short }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build & Push — notification-service
      uses: docker/build-push-action@v5
      with:
        context: ./services/notification-service
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/cabgo-notification-service:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/cabgo-notification-service:${{ steps.meta.outputs.sha_short }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build & Push — ai-matching-service
      uses: docker/build-push-action@v5
      with:
        context: ./services/ai-matching-service
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/cabgo-ai-matching-service:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/cabgo-ai-matching-service:${{ steps.meta.outputs.sha_short }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build & Push — fraud-service
      uses: docker/build-push-action@v5
      with:
        context: ./services/fraud-service
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/cabgo-fraud-service:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/cabgo-fraud-service:${{ steps.meta.outputs.sha_short }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Deployment Summary
      run: |
        echo "========================================================"
        echo "🚀 CabGo: Distributed Microservices Architecture"
        echo "   Deployment complete!"
        echo "   Commit: ${{ steps.meta.outputs.sha_short }}"
        echo "   Timestamp: ${{ steps.meta.outputs.timestamp }}"
        echo "   Docker Hub: hub.docker.com/u/${{ secrets.DOCKERHUB_USERNAME }}"
        echo "   Images pushed:"
        echo "   → ${{ secrets.DOCKERHUB_USERNAME }}/cabgo-api-gateway:${{ steps.meta.outputs.sha_short }}"
        echo "   → ${{ secrets.DOCKERHUB_USERNAME }}/cabgo-auth-service:${{ steps.meta.outputs.sha_short }}"
        echo "   → ${{ secrets.DOCKERHUB_USERNAME }}/cabgo-booking-service:${{ steps.meta.outputs.sha_short }}"
        echo "   → ${{ secrets.DOCKERHUB_USERNAME }}/cabgo-driver-service:${{ steps.meta.outputs.sha_short }}"
        echo "   → ${{ secrets.DOCKERHUB_USERNAME }}/cabgo-payment-service:${{ steps.meta.outputs.sha_short }}"
        echo "   → ${{ secrets.DOCKERHUB_USERNAME }}/cabgo-pricing-service:${{ steps.meta.outputs.sha_short }}"
        echo "   → ${{ secrets.DOCKERHUB_USERNAME }}/cabgo-notification-service:${{ steps.meta.outputs.sha_short }}"
        echo "   → ${{ secrets.DOCKERHUB_USERNAME }}/cabgo-ai-matching-service:${{ steps.meta.outputs.sha_short }}"
        echo "   → ${{ secrets.DOCKERHUB_USERNAME }}/cabgo-fraud-service:${{ steps.meta.outputs.sha_short }}"
        echo "========================================================"

