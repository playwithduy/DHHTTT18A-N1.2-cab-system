# ============================================================
# Kubernetes Manifests — CabGo Microservices
# Namespace: cabgo
# ============================================================

---
apiVersion: v1
kind: Namespace
metadata:
  name: cabgo
  labels:
    app: cabgo

---
# ── ConfigMap ────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: cabgo-config
  namespace: cabgo
data:
  KAFKA_BROKERS: "kafka-service:9092"
  REDIS_URL: "redis://redis-service:6379"
  DATABASE_URL: "postgresql://cabgo:$(POSTGRES_PASSWORD)@postgres-service:5432/cabgo"
  NODE_ENV: "production"

---
# ── Infrastructure Services ──────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: cabgo
spec:
  ports:
    - port: 5432
  selector:
    app: postgres
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: cabgo
spec:
  ports:
    - port: 6379
  selector:
    app: redis
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-service
  namespace: cabgo
spec:
  ports:
    - port: 9092
  selector:
    app: kafka
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb-service
  namespace: cabgo
spec:
  ports:
    - port: 27017
  selector:
    app: mongodb

---
# ── API Gateway Deployment ───────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: cabgo
  labels:
    app: api-gateway
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8080"
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: cabgo/api-gateway:latest
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: cabgo-secrets
                  key: JWT_SECRET
          envFrom:
            - configMapRef:
                name: cabgo-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-service
  namespace: cabgo
spec:
  selector:
    app: api-gateway
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: LoadBalancer

---
# ── Auth Service ──────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: cabgo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "3001"
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: cabgo/auth-service:latest
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: cabgo-config
          env:
            - name: PORT
              value: "3001"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: cabgo-secrets
                  key: JWT_SECRET
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: cabgo
spec:
  selector:
    app: auth-service
  ports:
    - port: 3001
      targetPort: 3001
  type: ClusterIP

---
# ── Booking Service ───────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-service
  namespace: cabgo
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  selector:
    matchLabels:
      app: booking-service
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "3002"
      labels:
        app: booking-service
    spec:
      containers:
        - name: booking-service
          image: cabgo/booking-service:latest
          ports:
            - containerPort: 3002
          envFrom:
            - configMapRef:
                name: cabgo-config
          env:
            - name: PORT
              value: "3002"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 5
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: booking-service
  namespace: cabgo
spec:
  selector:
    app: booking-service
  ports:
    - port: 3002
      targetPort: 3002
  type: ClusterIP

---
# ── Ride Service (WebSocket) ──────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ride-service
  namespace: cabgo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ride-service
  template:
    metadata:
      labels:
        app: ride-service
    spec:
      containers:
        - name: ride-service
          image: cabgo/ride-service:latest
          ports:
            - containerPort: 3003
          envFrom:
            - configMapRef:
                name: cabgo-config
          env:
            - name: PORT
              value: "3003"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: cabgo-secrets
                  key: JWT_SECRET
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

---
apiVersion: v1
kind: Service
metadata:
  name: ride-service
  namespace: cabgo
spec:
  selector:
    app: ride-service
  ports:
    - port: 3003
      targetPort: 3003
  type: ClusterIP

---
# ── AI Matching Service ────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-matching-service
  namespace: cabgo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-matching-service
  template:
    metadata:
      labels:
        app: ai-matching-service
    spec:
      containers:
        - name: ai-matching-service
          image: cabgo/ai-matching-service:latest
          ports:
            - containerPort: 3008
          envFrom:
            - configMapRef:
                name: cabgo-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

---
# ── Payment Service ───────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: cabgo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "3005"
      labels:
        app: payment-service
    spec:
      containers:
        - name: payment-service
          image: cabgo/payment-service:latest
          ports:
            - containerPort: 3005
          envFrom:
            - configMapRef:
                name: cabgo-config
          env:
            - name: PORT
              value: "3005"
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: cabgo-secrets
                  key: STRIPE_SECRET_KEY
          livenessProbe:
            httpGet:
              path: /health
              port: 3005
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3005
            initialDelaySeconds: 5
            periodSeconds: 5

---
# ── HPA — API Gateway ─────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway-hpa
  namespace: cabgo
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

---
# ── HPA — Booking Service ─────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: booking-service-hpa
  namespace: cabgo
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: booking-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65

---
# ── HPA — Ride Service ────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ride-service-hpa
  namespace: cabgo
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ride-service
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60

---
# ── Ingress ────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cabgo-ingress
  namespace: cabgo
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
spec:
  tls:
    - hosts:
        - api.cabgo.vn
        - app.cabgo.vn
        - driver.cabgo.vn
        - admin.cabgo.vn
      secretName: cabgo-tls
  rules:
    - host: api.cabgo.vn
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway-service
                port:
                  number: 80
    - host: app.cabgo.vn
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: customer-app-service
                port:
                  number: 3100
    - host: driver.cabgo.vn
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: driver-app-service
                port:
                  number: 3200
    - host: admin.cabgo.vn
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: admin-dashboard-service
                port:
                  number: 3300

---
# ── Secrets Template (replace with real values!) ──────────────
apiVersion: v1
kind: Secret
metadata:
  name: cabgo-secrets
  namespace: cabgo
type: Opaque
stringData:
  JWT_SECRET:         "REPLACE_WITH_STRONG_SECRET_MIN_32_CHARS"
  STRIPE_SECRET_KEY:  "sk_live_REPLACE"
  POSTGRES_PASSWORD:  "REPLACE_WITH_STRONG_PASSWORD"
  FCM_SERVER_KEY:     "REPLACE_WITH_FCM_KEY"
  MAPBOX_TOKEN:       "pk.REPLACE"

---
# ── Istio VirtualService (Service Mesh Simulation) ────────────
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: cabgo-virtual-service
  namespace: cabgo
spec:
  hosts:
  - api.cabgo.vn
  gateways:
  - cabgo-gateway
  http:
  - match:
    - uri:
        prefix: /bookings
    route:
    - destination:
        host: booking-service.cabgo.svc.cluster.local
        port:
          number: 3002
    retries:
      attempts: 3
      perTryTimeout: 2s
      retryOn: gateway-error,connect-failure,refused-stream
---
# ── Istio DestinationRule (mTLS Enforcement) ──────────────────
apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: cabgo-destination-rule
  namespace: cabgo
spec:
  host: "*.cabgo.svc.cluster.local"
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
